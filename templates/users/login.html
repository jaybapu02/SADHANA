{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <h3 class="card-title text-center fw-bold mb-4">Welcome Back</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {% for error in field.errors %}
                                    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                                {% endfor %}
                            </div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold shadow-sm">
                        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Login
                    </button>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted small">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
